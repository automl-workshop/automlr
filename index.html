<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hello, world!</title>
    <meta name="description" content="A simple Hello World site deployed on Cloudflare Pages.">
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #f7f7f8;
        color: #171717;
      }

      main {
        text-align: center;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 10vw, 7rem);
        letter-spacing: -0.05em;
      }

      p {
        color: #f48120;
        font-weight: 600;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: #111;
          color: #fafafa;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello, world!</h1>
      <p>Deployed with Cloudflare Pages.</p>
    </main>
  </body>
</html>
